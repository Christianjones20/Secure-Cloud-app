apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-cloud-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: secure-cloud-app

  template:
    metadata:
      labels:
        app: secure-cloud-app

    spec:
      containers:
      - name: secure-cloud-app
        image: ghcr.io/christianjones20/secure-cloud-app:latest
        ports:
        - containerPort: 5000
